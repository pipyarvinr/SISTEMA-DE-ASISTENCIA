<!-- Firebase (modular) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, signInAnonymously, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD56Nceo6QAnW2MlxyfSSS2MIId7zeNDxA",
  authDomain: "sistema-de-asistencia-c213a.firebaseapp.com",
  projectId: "sistema-de-asistencia-c213a",
  storageBucket: "sistema-de-asistencia-c213a.firebasestorage.app",
  appId: "1:447214728068:web:823bb8b2d22b549ab4e3d1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
await setPersistence(auth, browserSessionPersistence);

window._fb = { auth, db, collection, doc, addDoc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, signInAnonymously };
window._fbReady = true;
document.dispatchEvent(new Event('fbready'));
</script>

<style>
/* ========== ESTILOS COMPLETOS (igual que el original pero limpiado) ========== */
:root {
  --verde:#c0392b; --verde-oscuro:#922b21; --gris-bg:#fdf5f5; --borde:#f0d0d0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui, sans-serif;background:var(--gris-bg);}

<!-- LOGIN -->

  </div>
  <!-- Timer banner -->

    <div><div class="progress-bar" style="width:100px;height:6px;background:rgba(255,255,255,.3);border-radius:3px;"><div id="progressFill" style="width:0%;height:100%;background:#f1c40f;"></div></div></div>
    <div><button class="btn btn-sm" onclick="iniciarSesion()">▶ Iniciar</button> <button class="btn btn-sm" onclick="finalizarSesion()">■ Finalizar</button></div>
  </div>
  <!-- Navegación -->
  <div style="display:flex;gap:6px;padding:8px 16px;background:#f0e0e0;flex-wrap:wrap;">
    <button onclick="irPanel('asistencia')">📋 Asistencia</button>
    <button onclick="irPanel('admin')">👑 Admin</button>
    <button onclick="irPanel('justificaciones')">📄 Justificaciones</button>

    <!-- PANEL ASISTENCIA -->
    <div id="panel_asistencia" class="hide">
      <div class="card">
        <h3>📷 Escáner QR</h3>
        <button class="btn" onclick="abrirScanner()">Abrir cámara</button>
        <input type="file" id="photoUpload" accept="image/*" style="margin:12px 0;">
        <div id="scanResult"></div>

    <!-- PANEL ADMIN -->
    <div id="panel_admin" class="hide">
      <div class="card">

          <button class="btn btn-sm" onclick="generarReporte()">Actualizar</button>

        <canvas id="chartDia" style="max-height:200px;margin:16px 0;"></canvas>

    <!-- PANEL PADRE -->
    <div id="panel_padre" class="hide">

</div>

<!-- MODAL SCANNER -->
<div id="scannerModal" class="modal">

<div class="notif-stack" id="notifStack"></div>

<script>
// ======================== CÓDIGO COMPLETO CON TODAS LAS FUNCIONALIDADES ========================
let FB = null;
let sesion = null;
let estudiantesCache = [];
let asistenciaCache = [];
let justificacionesCache = [];
let ventanaActiva = false;
let tiempoRestante = 0;
let temporizador = null;
let scannerStream = null;
let escaneando = false;
let scanAnimationId = null;
let chartDia = null;

// Esperar Firebase
function esperarFB() {
  if (window._fbReady && window._fb) {
    FB = window._fb;
    document.getElementById('splashScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
    // Escuchar cambios de auth
    FB.onAuthStateChanged(FB.auth, async (user) => {
      if (user && !sesion) {
        const snap = await FB.getDoc(FB.doc(FB.db, 'usuarios', user.uid));
        if (snap.exists()) sesion = { uid: user.uid, ...snap.data() };
        entrarApp();
      }
    });
  } else setTimeout(esperarFB, 100);
}
esperarFB();

// LOGIN
let rolSel = 'admin';
function selRol(rol) { rolSel = rol; const esPadre = (rol === 'padre'); document.getElementById('loginCredDiv').classList.toggle('hide', esPadre); document.getElementById('loginPadreDiv').classList.toggle('hide', !esPadre); document.getElementById('loginBtn').onclick = esPadre ? hacerLoginPadre : hacerLogin; }
async function hacerLogin() {
  const email = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) { notif('❌ Complete los campos', 'error'); return; }
  try {
    await FB.signInWithEmailAndPassword(FB.auth, email, pass);
  } catch(e) { document.getElementById('loginErr').innerText = e.message; }
}
async function hacerLoginPadre() {
  const dni = document.getElementById('loginDNI').value.trim();
  if (!/^\d{8}$/.test(dni)) { notif('DNI inválido', 'error'); return; }
  try {
    if (!FB.auth.currentUser || !FB.auth.currentUser.isAnonymous) await FB.signInAnonymously(FB.auth);
    const hijos = await FB.getDocs(FB.query(FB.collection(FB.db, 'estudiantes'), FB.where('dniPadre', '==', dni)));
    if (hijos.empty) { notif('No se encontraron estudiantes con ese DNI', 'error'); return; }
    sesion = { uid: 'padre_'+dni, nombre: 'Apoderado', rol: 'padre', dni };
    entrarApp();
    irPanel('padre');
    document.getElementById('dniPadre').value = dni;
    consultarPadre();
  } catch(e) { notif(e.message, 'error'); }
}

async function entrarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appLayout').style.display = 'block';
  document.getElementById('sessionBadge').innerHTML = `${sesion.rol === 'admin' ? '👑' : (sesion.rol==='auxiliar'?'🛡️':'📖')} ${sesion.nombre || sesion.email || 'Usuario'}`;
  if (sesion.rol === 'padre') document.querySelectorAll('[onclick*="irPanel"]').forEach(btn => { if(!btn.innerText.includes('Mi Hijo')) btn.style.display='none'; });
  await cargarDatosIniciales();
  activarListeners();
  irPanel('asistencia');
  if (sesion.rol === 'admin') setTimeout(() => { ventanaActiva = true; tiempoRestante = 3600; actualizarTimer(); }, 500);
}

async function cargarDatosIniciales() {
  const snapEst = await FB.getDocs(FB.collection(FB.db, 'estudiantes'));
  estudiantesCache = snapEst.docs.map(d => ({ id: d.id, ...d.data() }));
  const fecha = new Date().toISOString().split('T')[0];
  const snapAsis = await FB.getDocs(FB.query(FB.collection(FB.db, 'asistencia'), FB.where('fecha', '==', fecha)));
  asistenciaCache = snapAsis.docs.map(d => ({ id: d.id, ...d.data() }));
  const snapJust = await FB.getDocs(FB.collection(FB.db, 'justificaciones'));
  justificacionesCache = snapJust.docs.map(d => ({ id: d.id, ...d.data() }));
}

function activarListeners() {
  FB.onSnapshot(FB.collection(FB.db, 'estudiantes'), snap => { estudiantesCache = snap.docs.map(d => ({ id: d.id, ...d.data() })); if (document.getElementById('panel_admin') && !document.getElementById('panel_admin').classList.contains('hide')) renderEstudiantes(); if (!document.getElementById('panel_asistencia').classList.contains('hide')) renderListaAsistencia(); });
  const fecha = new Date().toISOString().split('T')[0];
  FB.onSnapshot(FB.query(FB.collection(FB.db, 'asistencia'), FB.where('fecha', '==', fecha)), snap => { asistenciaCache = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderListaAsistencia(); actualizarStats(); });
  FB.onSnapshot(FB.collection(FB.db, 'justificaciones'), snap => { justificacionesCache = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderAlertasBadge(); if (!document.getElementById('panel_justificaciones').classList.contains('hide')) renderJustificaciones(); });
}

function cerrarSesion() {
  if (temporizador) clearInterval(temporizador);
  ventanaActiva = false;
  detenerCamara();
  sesion = null;
  FB.signOut(FB.auth);
  document.getElementById('appLayout').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
}

// TIMER
function iniciarSesion() {
  if (ventanaActiva) return notif('Ya hay una sesión activa', 'warning');
  const ahora = new Date();
  const hora = ahora.getHours(), minuto = ahora.getMinutes();
  if (!(hora === 13 || (hora === 14 && minuto === 0)) && sesion?.rol !== 'admin') return notif('Solo se puede iniciar entre 1pm y 2pm', 'error');
  let segundos = 3600;
  if (sesion?.rol !== 'admin') {
    const fin = new Date(); fin.setHours(14,0,0,0);
    segundos = Math.max(0, Math.floor((fin - ahora)/1000));
    if (segundos <= 0) return notif('Ya pasó el horario', 'error');
  }
  tiempoRestante = segundos;
  ventanaActiva = true;
  actualizarTimer();
  if (temporizador) clearInterval(temporizador);
  temporizador = setInterval(() => { if (tiempoRestante <= 0) finalizarSesion(); else { tiempoRestante--; actualizarTimer(); } }, 1000);
  notif('✅ Sesión iniciada', 'success');
}
function finalizarSesion() {
  if (temporizador) clearInterval(temporizador);
  ventanaActiva = false;
  document.getElementById('timerDisplay').innerText = '--:--';
  document.getElementById('progressFill').style.width = '0%';
  notif('Sesión finalizada', 'info');
}
function actualizarTimer() {
  if (sesion?.rol === 'admin' && tiempoRestante > 3600) { document.getElementById('timerDisplay').innerText = '∞'; document.getElementById('progressFill').style.width = '100%'; return; }
  const m = Math.floor(tiempoRestante/60).toString().padStart(2,'0');
  const s = (tiempoRestante%60).toString().padStart(2,'0');
  document.getElementById('timerDisplay').innerText = `${m}:${s}`;
  const pct = (tiempoRestante/3600)*100;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

// NAVEGACIÓN
function irPanel(panel) {
  ['asistencia','admin','justificaciones','reportes','padre'].forEach(p => document.getElementById(`panel_${p}`).classList.add('hide'));
  document.getElementById(`panel_${panel}`).classList.remove('hide');
  if (panel === 'admin') { renderEstudiantes(); renderListaUsuarios(); }
  if (panel === 'asistencia') renderListaAsistencia();
  if (panel === 'justificaciones') renderJustificaciones();
  if (panel === 'reportes') generarReporte();
}

// ESTUDIANTES
async function agregarEstudiante() {
  const nombre = document.getElementById('sNombre').value.trim();
  const dniPadre = document.getElementById('sDNI').value.trim();
  if (!nombre || !dniPadre || !/^\d{8}$/.test(dniPadre)) return notif('Nombre y DNI válido requeridos', 'error');
  await FB.addDoc(FB.collection(FB.db, 'estudiantes'), { nombre, dniPadre, grado: '1ro', seccion: 'A', telefono: '' });
  notif('Estudiante agregado', 'success');
  document.getElementById('sNombre').value = '';
  document.getElementById('sDNI').value = '';
}

function renderEstudiantes() {
  const container = document.getElementById('listaEstudiantes');
  if (!container) return;
  container.innerHTML = estudiantesCache.map(e => `
    <div class="student-card">
      <strong>${e.nombre}</strong><br>
      DNI: ${e.dniPadre}<br>
      <div id="qr_${e.id}" class="qr-container"></div>
      <button class="btn btn-sm" onclick="descargarQR('${e.id}')">📥 QR</button>
      <button class="btn btn-sm btn-secondary" onclick="eliminarEstudiante('${e.id}')">🗑</button>
    </div>
  `).join('');
  estudiantesCache.forEach(e => generarQR(e.id, e));
}

function generarQR(id, estudiante) {
  const div = document.getElementById(`qr_${id}`);
  if (!div) return;
  div.innerHTML = '';
  const canvas = document.createElement('canvas');
  canvas.width = 120; canvas.height = 120;
  div.appendChild(canvas);
  QRCode.toCanvas(canvas, id, { width: 120, margin: 4, errorCorrectionLevel: 'H' }, err => { if(err) console.warn(err); });
}

function descargarQR(id) {
  const est = estudiantesCache.find(e => e.id === id);
  if (!est) return;
  const canvas = document.createElement('canvas');
  QRCode.toCanvas(canvas, id, { width: 280, margin: 4, errorCorrectionLevel: 'H' }, () => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL();
    a.download = `QR_${est.nombre}.png`;
    a.click();
  });
}

async function eliminarEstudiante(id) {
  if (!confirm('¿Eliminar estudiante?')) return;
  await FB.deleteDoc(FB.doc(FB.db, 'estudiantes', id));
  notif('Eliminado', 'info');
}

// ASISTENCIA
async function registrarAsistencia(qrData) {
  if (!ventanaActiva && sesion?.rol !== 'admin') return notif('Debes iniciar la sesión de asistencia', 'error');
  let estudianteId = qrData;
  try { if (qrData.trim().startsWith('{')) estudianteId = JSON.parse(qrData).id; } catch(e) {}
  const estudiante = estudiantesCache.find(e => e.id === estudianteId);
  if (!estudiante) return notif('Estudiante no encontrado', 'error');
  const fecha = new Date().toISOString().split('T')[0];
  const existe = asistenciaCache.find(a => a.estudianteId === estudianteId && a.fecha === fecha);
  if (existe) return notif(`${estudiante.nombre} ya fue registrado hoy`, 'warning');
  const hora = new Date().toLocaleTimeString();
  try {
    await FB.addDoc(FB.collection(FB.db, 'asistencia'), { estudianteId, nombre: estudiante.nombre, grado: estudiante.grado, seccion: estudiante.seccion, fecha, hora, estado: 'presente' });
    notif(`✅ ${estudiante.nombre} presente`, 'success');
    renderListaAsistencia();
    actualizarStats();
  } catch(e) { notif('Error de red, guardado local', 'error'); }
}

function renderListaAsistencia() {
  const container = document.getElementById('listaAsistencia');
  if (!container) return;
  const fecha = new Date().toISOString().split('T')[0];
  const presentes = new Set(asistenciaCache.filter(a => a.fecha === fecha).map(a => a.estudianteId));
  container.innerHTML = estudiantesCache.map(e => `
    <div class="student-card ${presentes.has(e.id) ? 'presente' : ''}">
      <strong>${e.nombre}</strong><br>${e.grado} - ${e.seccion}<br>
      ${presentes.has(e.id) ? '<span class="badge">✅ Presente</span>' : `<button class="btn btn-sm" onclick="registrarAsistencia('${e.id}')">Marcar presente</button>`}
    </div>
  `).join('');
}

// JUSTIFICACIONES
function renderJustificaciones() {
  const container = document.getElementById('listaJustificaciones');
  if (!container) return;
  const pendientes = justificacionesCache.filter(j => j.estado === 'pendiente' || j.estado === 'alerta');
  container.innerHTML = pendientes.map(j => `
    <div class="card" style="margin:8px 0;">
      <strong>${j.nombre}</strong> (${j.grado} - ${j.seccion})<br>
      Motivo: ${j.motivo}<br>
      ${j.detalle ? `<p>${j.detalle}</p>` : ''}
      ${j.evidencia ? `<img src="${j.evidencia}" style="max-width:100px;">` : ''}
      <div style="margin-top:8px;">
        <button class="btn btn-sm" onclick="cambiarEstadoJustif('${j.id}','aprobado')">✅ Aprobar</button>
        <button class="btn btn-sm btn-secondary" onclick="cambiarEstadoJustif('${j.id}','rechazado')">❌ Rechazar</button>
      </div>
    </div>
  `).join('');
  const alertas = pendientes.filter(j => j.estado === 'alerta');
  document.getElementById('alertasBanner').innerHTML = alertas.map(a => `<div style="background:#f8d7da;padding:12px;margin:8px;border-radius:12px;">🚨 ALERTA: ${a.nombre} no llegó al colegio</div>`).join('');
}

}

async function guardarUsuario() {
  const nombre = document.getElementById('uNombre').value.trim();
  const email = document.getElementById('uEmail').value.trim();
  const pass = document.getElementById('uPass').value;
  const rol = document.getElementById('uRol').value;
  if (!nombre || !email || pass.length < 6) return notif('Complete campos válidos', 'error');
  try {
    const cred = await FB.createUserWithEmailAndPassword(FB.auth, email, pass);
    await FB.setDoc(FB.doc(FB.db, 'usuarios', cred.user.uid), { nombre, email, rol, grados: [], secciones: [] });

    notif('Usuario creado. Vuelve a iniciar sesión.', 'success');
    cerrarModalUsuario();

// REPORTES
async function generarReporte() {
  const fecha = new Date().toISOString().split('T')[0];
  const asistencias = await FB.getDocs(FB.collection(FB.db, 'asistencia'));
  const counts = {};
  estudiantesCache.forEach(e => { counts[e.grado] = (counts[e.grado] || 0) + 1; });
  const presentes = {};
  asistencias.docs.forEach(d => { const g = d.data().grado; if (d.data().fecha === fecha) presentes[g] = (presentes[g] || 0) + 1; });
  const labels = Object.keys(counts);
  const data = labels.map(l => presentes[l] || 0);
  if (chartDia) chartDia.destroy();
  const ctx = document.getElementById('chartDia').getContext('2d');
  chartDia = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'Presentes', data, backgroundColor: '#c0392b' }] } });
  const tbody = document.getElementById('tablaReporte');
  tbody.innerHTML = asistencias.docs.slice(0,20).map(d => `<div>${d.data().nombre} - ${d.data().fecha} ${d.data().hora}</div>`).join('');
}

async function consultarPadre() {
  const dni = document.getElementById('dniPadre').value.trim();

}

// ESCÁNER QR (CORREGIDO)
async function abrirScanner() {
  document.getElementById('scannerModal').classList.add('open');
  await iniciarCamara();
}
async function iniciarCamara() {
  detenerCamara();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: { exact: 'environment' } } });
    const video = document.getElementById('scannerVideo');
    video.srcObject = stream;
    scannerStream = stream;
    await video.play();
    escaneando = true;
    scanLoop();
  } catch(e) {
    document.getElementById('scanStatus').innerText = 'Error cámara: ' + e.message;
  }
}
function detenerCamara() {
  escaneando = false;
  if (scanAnimationId) cancelAnimationFrame(scanAnimationId);
  if (scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
}
async function scanLoop() {
  if (!escaneando) return;
  const video = document.getElementById('scannerVideo');
  if (video.readyState < 2) { scanAnimationId = requestAnimationFrame(scanLoop); return; }
  const canvas = document.createElement('canvas');
  let w = video.videoWidth, h = video.videoHeight;
  const maxDim = 800;
  if (w > maxDim || h > maxDim) { const ratio = Math.min(maxDim/w, maxDim/h); w = Math.floor(w*ratio); h = Math.floor(h*ratio); }
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);
  const imgData = ctx.getImageData(0,0,w,h);
  const code = window.jsQR(imgData.data, w, h, { inversionAttempts: 'attemptBoth' });
  if (code) {
    detenerCamara();
    document.getElementById('scannerModal').classList.remove('open');
    await registrarAsistencia(code.data);
  }
  scanAnimationId = requestAnimationFrame(scanLoop);
}
function cerrarScanner() { detenerCamara(); document.getElementById('scannerModal').classList.remove('open'); }
document.getElementById('photoUpload')?.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = async () => {
    URL.revokeObjectURL(url);
    let w = img.width, h = img.height;
    const maxDim = 800;
    if (w > maxDim || h > maxDim) { const ratio = Math.min(maxDim/w, maxDim/h); w = Math.floor(w*ratio); h = Math.floor(h*ratio); }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    const imgData = ctx.getImageData(0,0,w,h);
    const code = window.jsQR(imgData.data, w, h, { inversionAttempts: 'attemptBoth' });
    if (code) await registrarAsistencia(code.data);
    else alert('No se detectó QR en la imagen');
    document.getElementById('photoUpload').value = '';
  };
  img.src = url;
});
