<script>
// ======================== CÓDIGO COMPLETO ========================
let FB = null, sesion = null;
let estudiantesCache = [], asistenciaCache = [], justificacionesCache = [];
let ventanaActiva = false, tiempoRestante = 0, temporizador = null;
let scannerStream = null, escaneando = false, scanAnimationId = null, facingMode = 'environment';
let chartDia = null, justifEstudianteId = null, motivoSel = null, evidenciaBase64 = null;
let _listeners = {};
const OFFLINE_QUEUE_KEY = 'asistenciaQR_offline';

// Esperar Firebase
function esperarFB() {
  if (window._fbReady && window._fb) {
    FB = window._fb;
    document.getElementById('splashScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
    FB.onAuthStateChanged(FB.auth, async (user) => {
      if (user && !sesion) {
        const snap = await FB.getDoc(FB.doc(FB.db, 'usuarios', user.uid));
        if (snap.exists()) sesion = { uid: user.uid, ...snap.data() };
        entrarApp();
      }
    });
  } else setTimeout(esperarFB, 100);
}
esperarFB();

// LOGIN
let rolSel = 'admin';
function selRol(rol) { rolSel = rol; const esPadre = rol === 'padre'; document.getElementById('loginCredDiv').classList.toggle('hide', esPadre); document.getElementById('loginPadreDiv').classList.toggle('hide', !esPadre); document.getElementById('loginBtn').onclick = esPadre ? hacerLoginPadre : hacerLogin; }
async function hacerLogin() {
  const email = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) return notif('Complete campos', 'error');
  try { await FB.signInWithEmailAndPassword(FB.auth, email, pass); } catch(e) { document.getElementById('loginErr').innerText = e.message; }
}
async function hacerLoginPadre() {
  const dni = document.getElementById('loginDNI').value.trim();
  if (!/^\d{8}$/.test(dni)) return notif('DNI inválido', 'error');
  try {
    if (!FB.auth.currentUser?.isAnonymous) await FB.signInAnonymously(FB.auth);
    const q = FB.query(FB.collection(FB.db, 'estudiantes'), FB.where('dniPadre', '==', dni));
    const snap = await FB.getDocs(q);
    if (snap.empty) return notif('No hay estudiantes con ese DNI', 'error');
    sesion = { uid: 'padre_'+dni, nombre: 'Apoderado', rol: 'padre', dni };
    entrarApp(); irPanel('padre'); document.getElementById('dniPadre').value = dni; consultarPadre();
  } catch(e) { notif(e.message, 'error'); }
}
async function entrarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appLayout').style.display = 'block';
  document.getElementById('sessionBadge').innerHTML = `${sesion.rol==='admin'?'👑':(sesion.rol==='auxiliar'?'🛡️':'📖')} ${sesion.nombre||sesion.email||'Usuario'}`;
  if (sesion.rol === 'padre') document.querySelectorAll('[onclick*="irPanel"]').forEach(btn => { if(!btn.innerText.includes('Mi Hijo')) btn.style.display='none'; });
  if (sesion.rol === 'admin') document.getElementById('btnModoPrueba').style.display = '';
  await cargarDatosIniciales();
  activarListeners();
  irPanel('asistencia');
}
async function cargarDatosIniciales() {
  try {
    const snapEst = await FB.getDocs(FB.collection(FB.db, 'estudiantes'));
    estudiantesCache = snapEst.docs.map(d => ({ id: d.id, ...d.data() }));
    const fecha = new Date().toISOString().split('T')[0];
    const snapAsis = await FB.getDocs(FB.query(FB.collection(FB.db, 'asistencia'), FB.where('fecha', '==', fecha)));
    asistenciaCache = snapAsis.docs.map(d => ({ id: d.id, ...d.data() }));
    const snapJust = await FB.getDocs(FB.collection(FB.db, 'justificaciones'));
    justificacionesCache = snapJust.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { console.error(e); }
}
function activarListeners() {
  if (_listeners.est) _listeners.est();
  _listeners.est = FB.onSnapshot(FB.collection(FB.db, 'estudiantes'), snap => { estudiantesCache = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderEstudiantes(); renderListaAsistencia(); });
  const fecha = new Date().toISOString().split('T')[0];
  if (_listeners.asis) _listeners.asis();
  _listeners.asis = FB.onSnapshot(FB.query(FB.collection(FB.db, 'asistencia'), FB.where('fecha', '==', fecha)), snap => { asistenciaCache = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderListaAsistencia(); actualizarStats(); });
  if (_listeners.just) _listeners.just();
  _listeners.just = FB.onSnapshot(FB.collection(FB.db, 'justificaciones'), snap => { justificacionesCache = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderJustificaciones(); });
}
function cerrarSesion() {
  if (temporizador) clearInterval(temporizador); ventanaActiva = false; detenerCamara();
  Object.values(_listeners).forEach(u => { try { u(); } catch(e) {} });
  sesion = null; FB.signOut(FB.auth);
  document.getElementById('appLayout').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
}
// TIMER
function iniciarSesion() {
  if (ventanaActiva) return notif('Ya activa', 'warning');
  const ahora = new Date(), hora = ahora.getHours(), min = ahora.getMinutes();
  if (!(hora === 13 || (hora === 14 && min === 0)) && sesion?.rol !== 'admin') return notif('Solo 1pm-2pm', 'error');
  let seg = 3600;
  if (sesion?.rol !== 'admin') {
    const fin = new Date(); fin.setHours(14,0,0,0);
    seg = Math.max(0, Math.floor((fin - ahora)/1000));
    if (seg <= 0) return notif('Fuera de horario', 'error');
  }
  tiempoRestante = seg; ventanaActiva = true; actualizarTimer();
  if (temporizador) clearInterval(temporizador);
  temporizador = setInterval(() => { if (tiempoRestante <= 0) finalizarSesion(); else { tiempoRestante--; actualizarTimer(); } }, 1000);
  notif('Sesión iniciada', 'success');
}
function finalizarSesion() { if (temporizador) clearInterval(temporizador); ventanaActiva = false; document.getElementById('timerDisplay').innerText = '--:--'; document.getElementById('progressFill').style.width = '0%'; notif('Sesión finalizada', 'info'); }
function actualizarTimer() {
  if (sesion?.rol === 'admin' && tiempoRestante > 3600) { document.getElementById('timerDisplay').innerText = '∞'; document.getElementById('progressFill').style.width = '100%'; return; }
  const m = Math.floor(tiempoRestante/60).toString().padStart(2,'0');
  const s = (tiempoRestante%60).toString().padStart(2,'0');
  document.getElementById('timerDisplay').innerText = `${m}:${s}`;
  document.getElementById('progressFill').style.width = `${(tiempoRestante/3600)*100}%`;
}
function iniciarModoPrueba() { if (sesion?.rol !== 'admin') return notif('Solo admin', 'error'); ventanaActiva = true; tiempoRestante = 3600; actualizarTimer(); notif('Modo prueba activo', 'info'); }
// NAVEGACIÓN
function irPanel(panel) {
  ['asistencia','admin','justificaciones','reportes','padre'].forEach(p => document.getElementById(`panel_${p}`).classList.add('hide'));
  document.getElementById(`panel_${panel}`).classList.remove('hide');
  if (panel === 'admin') { renderEstudiantes(); renderListaUsuarios(); }
  if (panel === 'asistencia') renderListaAsistencia();
  if (panel === 'justificaciones') renderJustificaciones();
  if (panel === 'reportes') generarReporte();
}
// ESTUDIANTES
async function agregarEstudiante() {
  const nombre = document.getElementById('sNombre').value.trim();
  const dniPadre = document.getElementById('sDNI').value.trim();
  const grado = document.getElementById('sGrado').value;
  const seccion = document.getElementById('sSeccion').value;
  if (!nombre || !dniPadre || !/^\d{8}$/.test(dniPadre)) return notif('Nombre y DNI válido', 'error');
  await FB.addDoc(FB.collection(FB.db, 'estudiantes'), { nombre, dniPadre, grado, seccion, telefono: '' });
  notif('Estudiante agregado', 'success');
  document.getElementById('sNombre').value = ''; document.getElementById('sDNI').value = '';
}
function renderEstudiantes() {
  const container = document.getElementById('listaEstudiantes');
  if (!container) return;
  let lista = [...estudiantesCache];
  const gf = document.getElementById('fGradoAdmin')?.value;
  const sf = document.getElementById('fSecAdmin')?.value;
  if (gf) lista = lista.filter(e => e.grado === gf);
  if (sf) lista = lista.filter(e => e.seccion === sf);
  if (!lista.length) { container.innerHTML = '<div style="text-align:center;padding:20px;">Sin estudiantes</div>'; return; }
  container.innerHTML = lista.map(e => `
    <div class="student-card"><strong>${escapeHtml(e.nombre)}</strong><br>${e.grado} - ${e.seccion}<br>DNI: ${e.dniPadre}
    <div id="qr_${e.id}" class="qr-container"></div><button class="btn btn-sm" onclick="descargarQR('${e.id}')">📥 QR</button>
    <button class="btn btn-sm btn-danger" onclick="eliminarEstudiante('${e.id}')">🗑</button></div>
  `).join('');
  lista.forEach(e => { const div = document.getElementById(`qr_${e.id}`); if(div) QRCode.toCanvas(div.appendChild(document.createElement('canvas')), e.id, { width:120, margin:4, errorCorrectionLevel:'H' }); });
}
async function eliminarEstudiante(id) { if(confirm('¿Eliminar?')) await FB.deleteDoc(FB.doc(FB.db, 'estudiantes', id)); notif('Eliminado','info'); }
function descargarQR(id) { const e = estudiantesCache.find(e=>e.id===id); if(!e) return; QRCode.toDataURL(id, { width:280, margin:4, errorCorrectionLevel:'H' }, (err,url)=>{ if(!err){ const a=document.createElement('a'); a.href=url; a.download=`QR_${e.nombre}.png`; a.click(); } }); }
async function imprimirQRMasivo() {
  let lista = estudiantesCache;
  const gf = document.getElementById('fGradoAdmin')?.value, sf = document.getElementById('fSecAdmin')?.value;
  if (gf) lista = lista.filter(e=>e.grado===gf);
  if (sf) lista = lista.filter(e=>e.seccion===sf);
  let html = '<html><head><style>.tarjeta{display:inline-block;width:200px;margin:6px;border:1px solid #ccc;padding:8px;text-align:center;}</style></head><body>';
  for(const e of lista){
    const qr = await new Promise(res => QRCode.toDataURL(e.id, {width:160, margin:4}, (err,url)=>res(url)));
    html += `<div class="tarjeta"><img src="${qr}" width="120"><br><strong>${e.nombre}</strong><br>${e.grado} - ${e.seccion}</div>`;
  }
  html += '</body></html>';
  const w = window.open(); w.document.write(html); w.document.close(); w.print();
}
// ASISTENCIA
async function registrarAsistencia(qrData) {
  if (!ventanaActiva && sesion?.rol !== 'admin') return notif('Inicie sesión de asistencia', 'error');
  let estudianteId = qrData.trim();
  if (estudianteId.startsWith('{')) try { estudianteId = JSON.parse(estudianteId).id; } catch(e){}
  const est = estudiantesCache.find(e=>e.id===estudianteId);
  if(!est) return notif('Estudiante no encontrado','error');
  const fecha = new Date().toISOString().split('T')[0];
  if(asistenciaCache.some(a=>a.estudianteId===estudianteId && a.fecha===fecha)) return notif(`${est.nombre} ya registrado`,'warning');
  const hora = new Date().toLocaleTimeString();
  const data = { estudianteId, nombre:est.nombre, grado:est.grado, seccion:est.seccion, fecha, hora, estado:'presente' };
  try {
    await FB.addDoc(FB.collection(FB.db, 'asistencia'), data);
    notif(`✅ ${est.nombre} presente`,'success');
  } catch(e){
    let cola = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY)||'[]');
    cola.push(data); localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(cola));
    notif(`📦 ${est.nombre} guardado offline`,'warning');
  }
  renderListaAsistencia();
}
function renderListaAsistencia() {
  const container = document.getElementById('listaAsistencia');
  if(!container) return;
  let lista = [...estudiantesCache];
  const gf = document.getElementById('fGradoAux')?.value, sf = document.getElementById('fSecAux')?.value;
  if(gf) lista = lista.filter(e=>e.grado===gf);
  if(sf) lista = lista.filter(e=>e.seccion===sf);
  const fecha = new Date().toISOString().split('T')[0];
  const presentes = new Set(asistenciaCache.filter(a=>a.fecha===fecha).map(a=>a.estudianteId));
  container.innerHTML = lista.map(e=>`
    <div class="student-card ${presentes.has(e.id)?'presente':''}">
      <strong>${escapeHtml(e.nombre)}</strong><br>${e.grado} - ${e.seccion}<br>
      ${presentes.has(e.id)?'✅ Presente':`<button class="btn btn-primary btn-sm" onclick="registrarAsistencia('${e.id}')">Marcar presente</button>`}
    </div>
  `).join('');
  const tbody = document.getElementById('tablaAsistencia');
  if(tbody) tbody.innerHTML = asistenciaCache.filter(a=>a.fecha===fecha).map(a=>`<div>${a.nombre} - ${a.hora}</div>`).join('');
}
// JUSTIFICACIONES
function abrirJustif(id) { justifEstudianteId = id; motivoSel=null; evidenciaBase64=null; document.getElementById('justifEstudInfo').innerText = estudiantesCache.find(e=>e.id===id)?.nombre||''; document.getElementById('modalJustif').classList.add('open'); }
function selMotivo(m) { motivoSel=m; document.getElementById('justifDetalle').focus(); }
function previsualizarEvidencia(input) { const file=input.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=e=>{ evidenciaBase64=e.target.result; document.getElementById('evidenciaPreview').innerHTML=`<img src="${evidenciaBase64}" style="max-width:100px;">`; }; reader.readAsDataURL(file); }
async function enviarJustificacion() {
  if(!justifEstudianteId||!motivoSel) return notif('Seleccione motivo','error');
  const detalle = document.getElementById('justifDetalle').value.trim();
  if(!detalle && motivoSel!=='alerta') return notif('Descripción obligatoria','error');
  const est = estudiantesCache.find(e=>e.id===justifEstudianteId);
  const fecha = new Date().toISOString().split('T')[0];
  const data = { estudianteId:justifEstudianteId, nombre:est.nombre, grado:est.grado, seccion:est.seccion, fecha, hora:new Date().toLocaleTimeString(), motivo:motivoSel, detalle, evidencia:evidenciaBase64||null, estado:motivoSel==='alerta'?'alerta':'pendiente', telefono:est.telefono||'' };
  await FB.addDoc(FB.collection(FB.db, 'justificaciones'), data);
  notif('Justificación enviada','success');
  document.getElementById('modalJustif').classList.remove('open');
}
async function cambiarEstadoJustif(id, estado) {
  const ahora = new Date(), vence = new Date(ahora.getTime()+48*60*60*1000);
  await FB.updateDoc(FB.doc(FB.db, 'justificaciones', id), { estado, validadoEn:ahora.toISOString(), venceEn:vence.toISOString(), validadoPor:sesion?.nombre||'Admin' });
  notif(`Justificación ${estado}`, 'success');
  if(estado==='aprobado') generarBoleta(id);
}
async function generarBoleta(id) { const j = await FB.getDoc(FB.doc(FB.db, 'justificaciones', id)); if(!j.exists()) return; const data=j.data(); const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Arial;padding:20px;} .boleta{border:1px solid #ccc;padding:20px;max-width:400px;margin:auto;}</style></head><body><div class="boleta"><h2>IE N.° 0148</h2><p>Boleta de justificación</p><p><strong>Estudiante:</strong> ${data.nombre}</p><p><strong>Grado:</strong> ${data.grado} - ${data.seccion}</p><p><strong>Fecha inasistencia:</strong> ${data.fecha}</p><p><strong>Motivo:</strong> ${data.motivo}</p><p><strong>Validado por:</strong> ${data.validadoPor}</p><p><strong>Válido hasta:</strong> ${new Date(data.venceEn).toLocaleString()}</p><hr><p>Presente esta boleta en la institución.</p></div></body></html>`; const w=window.open(); w.document.write(html); w.document.close(); w.print(); }
function renderJustificaciones() {
  const container = document.getElementById('listaJustificaciones'); if(!container) return;
  let lista = justificacionesCache;
  const estado = document.getElementById('fJustifEstado')?.value;
  if(estado) lista = lista.filter(j=>j.estado===estado);
  container.innerHTML = lista.map(j=>`<div class="card"><strong>${j.nombre}</strong> (${j.grado} - ${j.seccion})<br>Motivo: ${j.motivo}<br>${j.detalle||''}<br>Estado: ${j.estado}${j.evidencia?` <button onclick="verEvidencia('${j.evidencia}')">Ver evidencia</button>`:''}<br>${j.estado==='pendiente'?`<button onclick="cambiarEstadoJustif('${j.id}','aprobado')">Aprobar</button> <button onclick="cambiarEstadoJustif('${j.id}','rechazado')">Rechazar</button>`:''}</div>`).join('');
}
function verEvidencia(src) { document.getElementById('evidenciaFullImg').src=src; document.getElementById('modalEvidencia').classList.add('open'); }
// REPORTES
async function generarReporte() {
  const grado = document.getElementById('rGrado')?.value, seccion = document.getElementById('rSeccion')?.value;
  let asistencias = await FB.getDocs(FB.collection(FB.db, 'asistencia'));
  let lista = asistencias.docs.map(d=>d.data());
  if(grado) lista = lista.filter(a=>a.grado===grado);
  if(seccion) lista = lista.filter(a=>a.seccion===seccion);
  const fechas = [...new Set(lista.map(a=>a.fecha))].slice(-7);
  const dataDia = fechas.map(f=>lista.filter(a=>a.fecha===f).length);
  if(chartDia) chartDia.destroy();
  chartDia = new Chart(document.getElementById('chartDia'), { type:'line', data:{ labels:fechas, datasets:[{ label:'Asistencias', data:dataDia, borderColor:'#c0392b' }] } });
  document.getElementById('tablaReporte').innerHTML = lista.slice(0,30).map(a=>`<div>${a.nombre} - ${a.fecha} ${a.hora}</div>`).join('');
}
function exportarExcel() {
  const wsData = [['Nombre','Grado','Sección','Fecha','Hora','Estado']];
  asistenciaCache.forEach(a=>wsData.push([a.nombre, a.grado, a.seccion, a.fecha, a.hora, a.estado||'presente']));
  const wb = XLSX.utils.book_new(), ws = XLSX.utils.aoa_to_sheet(wsData);
  XLSX.utils.book_append_sheet(wb, ws, 'Asistencia');
  XLSX.writeFile(wb, `asistencia_${new Date().toISOString().slice(0,10)}.xlsx`);
}
// PANEL PADRE
async function consultarPadre() {
  const dni = document.getElementById('dniPadre').value.trim();
  const hijos = estudiantesCache.filter(e=>e.dniPadre===dni);
  const container = document.getElementById('hijosInfo');
  if(!hijos.length) { container.innerHTML='<p>No hay hijos con ese DNI</p>'; return; }
  const fecha = new Date().toISOString().split('T')[0];
  const presentes = new Set(asistenciaCache.filter(a=>a.fecha===fecha).map(a=>a.estudianteId));

}
// ESCÁNER QR
async function abrirScanner() { document.getElementById('scannerModal').classList.add('open'); switchScanTab('camera'); await iniciarCamara(); }
function switchScanTab(tab) { document.getElementById('spCamera').style.display=tab==='camera'?'block':'none'; document.getElementById('spPhoto').style.display=tab==='photo'?'block':'none'; document.getElementById('spManual').style.display=tab==='manual'?'block':'none'; if(tab==='camera') iniciarCamara(); if(tab==='photo') document.getElementById('photoInput').onchange=procesarFotoQR; if(tab==='manual') document.getElementById('manualInput').oninput=buscarManual; }
async function iniciarCamara() { detenerCamara(); try { const stream = await navigator.mediaDevices.getUserMedia({ video: { width:640, height:480, facingMode:{exact:facingMode} } }); const video=document.getElementById('scannerVideo'); video.srcObject=stream; scannerStream=stream; await video.play(); escaneando=true; scanLoop(); } catch(e) { document.getElementById('scanStatus').innerText='Error cámara: '+e.message; } }
function detenerCamara() { escaneando=false; if(scanAnimationId) cancelAnimationFrame(scanAnimationId); if(scannerStream){ scannerStream.getTracks().forEach(t=>t.stop()); scannerStream=null; } }
async function scanLoop() { if(!escaneando) return; const video=document.getElementById('scannerVideo'); if(video.readyState<2){ scanAnimationId=requestAnimationFrame(scanLoop); return; } let w=video.videoWidth, h=video.videoHeight; const maxDim=800; if(w>maxDim||h>maxDim){ const r=Math.min(maxDim/w,maxDim/h); w=Math.floor(w*r); h=Math.floor(h*r); } const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(video,0,0,w,h); const imgData=canvas.getContext('2d').getImageData(0,0,w,h); const code=jsQR(imgData.data,w,h,{inversionAttempts:'attemptBoth'}); if(code){ detenerCamara(); document.getElementById('scannerModal').classList.remove('open'); registrarAsistencia(code.data); return; } scanAnimationId=requestAnimationFrame(scanLoop); }
function flipCam() { facingMode = facingMode==='environment'?'user':'environment'; iniciarCamara(); }
async function procesarFotoQR(e) { const file=e.target.files[0]; if(!file) return; const img=new Image(); img.src=URL.createObjectURL(file); img.onload=async()=>{ let w=img.width, h=img.height; const maxDim=800; if(w>maxDim||h>maxDim){ const r=Math.min(maxDim/w,maxDim/h); w=Math.floor(w*r); h=Math.floor(h*r); } const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h); const imgData=canvas.getContext('2d').getImageData(0,0,w,h); const code=jsQR(imgData.data,w,h,{inversionAttempts:'attemptBoth'}); if(code) await registrarAsistencia(code.data); else alert('No se detectó QR'); URL.revokeObjectURL(img.src); }; }
function buscarManual() { const q=document.getElementById('manualInput').value.trim().toLowerCase(); const resultados=estudiantesCache.filter(e=>e.nombre.toLowerCase().includes(q)).slice(0,5); document.getElementById('manualResultados').innerHTML=resultados.map(e=>`<div onclick="registrarAsistencia('${e.id}')">${e.nombre} (${e.grado} - ${e.seccion})</div>`).join(''); }
function cerrarScanner() { detenerCamara(); document.getElementById('scannerModal').classList.remove('open'); }
// USUARIOS
async function renderListaUsuarios() { const users=await FB.getDocs(FB.collection(FB.db, 'usuarios')); document.getElementById('listaUsuarios').innerHTML=users.docs.map(d=>`<div>${d.data().nombre} (${d.data().rol}) - ${d.data().email}</div>`).join(''); }
function abrirModalUsuario() { document.getElementById('modalUsuario').classList.add('open'); }
function cerrarModalUsuario() { document.getElementById('modalUsuario').classList.remove('open'); }
async function guardarUsuario() { const nombre=document.getElementById('uNombre').value.trim(), email=document.getElementById('uEmail').value.trim(), pass=document.getElementById('uPass').value, rol=document.getElementById('uRol').value; if(!nombre||!email||pass.length<6) return notif('Complete campos','error'); try { const cred=await FB.createUserWithEmailAndPassword(FB.auth,email,pass); await FB.setDoc(FB.doc(FB.db,'usuarios',cred.user.uid),{nombre,email,rol,grados:[...document.getElementById('uGrados').selectedOptions].map(o=>o.value),secciones:[...document.getElementById('uSecciones').selectedOptions].map(o=>o.value)}); await FB.signOut(FB.auth); notif('Usuario creado, vuelva a iniciar sesión','success'); cerrarModalUsuario(); } catch(e){ notif(e.message,'error'); } }
// NOTIFICACIONES Y UTILS
function notif(msg, tipo) { const s=document.getElementById('notifStack'); const el=document.createElement('div'); el.className='notif'; el.innerText=msg; s.appendChild(el); setTimeout(()=>el.remove(),4000); }
function escapeHtml(s) { return String(s).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function actualizarStats() {}
function cerrarModalJustif() { document.getElementById('modalJustif').classList.remove('open'); }
function cerrarModalEvidencia() { document.getElementById('modalEvidencia').classList.remove('open'); }

window.agregarEstudiante=agregarEstudiante; window.descargarQR=descargarQR; window.registrarAsistencia=registrarAsistencia; window.abrirScanner=abrirScanner; window.cerrarScanner=cerrarScanner; window.irPanel=irPanel; window.hacerLogin=hacerLogin; window.cerrarSesion=cerrarSesion; window.consultarPadre=consultarPadre; window.selRol=selRol; window.iniciarSesion=iniciarSesion; window.finalizarSesion=finalizarSesion; window.eliminarEstudiante=eliminarEstudiante; window.cambiarEstadoJustif=cambiarEstadoJustif; window.generarReporte=generarReporte; window.exportarExcel=exportarExcel; window.abrirModalUsuario=abrirModalUsuario; window.cerrarModalUsuario=cerrarModalUsuario; window.guardarUsuario=guardarUsuario; window.imprimirQRMasivo=imprimirQRMasivo; window.abrirJustif=abrirJustif; window.selMotivo=selMotivo; window.previsualizarEvidencia=previsualizarEvidencia; window.enviarJustificacion=enviarJustificacion; window.verEvidencia=verEvidencia; window.flipCam=flipCam; window.iniciarModoPrueba=iniciarModoPrueba; window.switchScanTab=switchScanTab; window.cerrarModalJustif=cerrarModalJustif; window.cerrarModalEvidencia=cerrarModalEvidencia; window.cerrarModalBoleta=cerrarModalBoleta;
if(document.getElementById('photoInput')) document.getElementById('photoInput').addEventListener('change', procesarFotoQR);
if(document.getElementById('evidenciaInput')) document.getElementById('evidenciaInput').addEventListener('change', function(e){ previsualizarEvidencia(e.target); });
